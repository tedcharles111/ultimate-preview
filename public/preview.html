<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
  <style>
    /* your existing styles (unchanged) */
    body { margin: 0; padding: 0; overflow: hidden; background: white; font-family: sans-serif; }
    #preview { width: 100vw; height: 100vh; border: none; }
    #error { display: none; color: #d32f2f; background: #ffebee; padding: 20px; position: absolute; top: 0; left: 0; right: 0; z-index: 1000; white-space: pre-wrap; font-family: monospace; max-height: 200px; overflow: auto; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    #loading svg { display: block; margin: 0 auto 20px; }
  </style>
</head>
<body>
  <div id="loading">
    <!-- Your SVG (unchanged) -->
    <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">...</svg>
    <span id="loading-message">Booting WebContainer...</span>
  </div>
  <iframe id="preview" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads" style="display: none;"></iframe>
  <div id="error"></div>

  <script type="importmap">
    {
      "imports": {
        "@webcontainer/api": "https://esm.sh/@webcontainer/api@1.2.4"
      }
    }
  </script>

  <script type="module">
    import { WebContainer } from '@webcontainer/api';

    const previewFrame = document.getElementById('preview');
    const loadingDiv = document.getElementById('loading');
    const loadingMessage = document.getElementById('loading-message');
    const errorDiv = document.getElementById('error');
    const sessionId = window.location.pathname.split('/').pop();

    let startupTimeout;
    let db; // IndexedDB database reference

    // ---------- IndexedDB setup ----------
    function openDB() {
      return new Promise((resolve, reject) => {
        const request = indexedDB.open('webcontainer-cache', 1);
        request.onerror = () => reject(request.error);
        request.onupgradeneeded = (event) => {
          const db = event.target.result;
          if (!db.objectStoreNames.contains('deps')) {
            db.createObjectStore('deps');
          }
        };
        request.onsuccess = () => resolve(request.result);
      });
    }

    async function getCachedNodeModules(pkgHash) {
      if (!db) db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('deps', 'readonly');
        const store = tx.objectStore('deps');
        const request = store.get(pkgHash);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function setCachedNodeModules(pkgHash, files) {
      if (!db) db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction('deps', 'readwrite');
        const store = tx.objectStore('deps');
        const request = store.put(files, pkgHash);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    // Simple hash function (use crypto.subtle if available, else fallback)
    async function hashString(str) {
      const encoder = new TextEncoder();
      const data = encoder.encode(str);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    // ---------- Helper to recursively write cached files ----------
    async function writeNodeModules(webcontainer, nodeModulesFiles) {
      loadingMessage.innerText = 'Restoring cached dependencies...';
      const promises = [];
      for (const [filePath, content] of Object.entries(nodeModulesFiles)) {
        // Ensure directory structure exists
        const parts = filePath.split('/');
        let current = '/';
        for (let i = 0; i < parts.length - 1; i++) {
          const dir = parts[i];
          if (dir && !(await webcontainer.fs.exists(current + dir))) {
            await webcontainer.fs.mkdir(current + dir);
          }
          current += dir + '/';
        }
        promises.push(webcontainer.fs.writeFile(filePath, content));
      }
      await Promise.all(promises);
    }

    // ---------- Mount files and optionally install ----------
    async function mountAndInstall(webcontainer, session) {
      // Build mount structure
      const mountStructure = {};
      for (const [filePath, fileContent] of Object.entries(session.files)) {
        const parts = filePath.split('/');
        let current = mountStructure;
        for (let i = 0; i < parts.length; i++) {
          const part = parts[i];
          if (i === parts.length - 1) {
            current[part] = { file: { contents: fileContent } };
          } else {
            current[part] = current[part] || { directory: {} };
            current = current[part].directory;
          }
        }
      }
      await webcontainer.mount(mountStructure);

      // If no package.json, we're done
      if (!session.files['package.json']) return false; // no install

      // Prepare package info for hashing
      const pkg = session.files['package.json'];
      const lock = session.files['package-lock.json'] || '';
      const pkgHash = await hashString(pkg + lock);

      // Try to get cached node_modules
      const cached = await getCachedNodeModules(pkgHash);
      if (cached) {
        loadingMessage.innerText = 'Restoring cached dependencies...';
        await writeNodeModules(webcontainer, cached);
        return true; // installed via cache
      }

      // No cache – run npm install
      loadingMessage.innerText = 'Installing dependencies (first time, will be cached)...';
      const hasLockfile = !!session.files['package-lock.json'];
      const installCmd = hasLockfile ? 'ci' : 'install';
      const installArgs = [installCmd, '--prefer-offline', '--no-audit', '--no-fund'];
      const installProcess = await webcontainer.spawn('npm', installArgs);

      let installError = '';
      installProcess.output.pipeTo(new WritableStream({
        write(data) {
          console.log('npm install:', data);
          if (data.includes('error') || data.includes('ERR!')) {
            installError += data;
            reportError('Install Error', data);
          }
        }
      }));

      const installExit = await installProcess.exit;
      if (installExit !== 0) {
        reportError('Installation Failed', `npm ${installCmd} failed. Last errors:\n${installError.slice(-1000)}`);
        return false;
      }

      // After install, read node_modules files and cache them
      loadingMessage.innerText = 'Caching dependencies for future previews...';
      const nodeModulesFiles = {};
      const dirsToWalk = ['/node_modules']; // start at root
      while (dirsToWalk.length) {
        const dir = dirsToWalk.pop();
        const entries = await webcontainer.fs.readdir(dir);
        for (const entry of entries) {
          const fullPath = `${dir}/${entry}`;
          const stat = await webcontainer.fs.stat(fullPath);
          if (stat.isDirectory) {
            dirsToWalk.push(fullPath);
          } else {
            const content = await webcontainer.fs.readFile(fullPath, 'utf-8');
            nodeModulesFiles[fullPath.slice(1)] = content; // store relative path
          }
        }
      }
      await setCachedNodeModules(pkgHash, nodeModulesFiles);
      return true;
    }

    // ---------- Report error (unchanged) ----------
    function reportError(type, message, details = {}) {
      console.error(type, message, details);
      errorDiv.style.display = 'block';
      errorDiv.innerHTML += `<div><strong>${type}:</strong> ${message}</div>`;
      loadingDiv.style.display = 'none';
      fetch(`/api/preview/${sessionId}/error`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, message, ...details, timestamp: Date.now() })
      }).catch(() => {});
    }

    // ---------- Interceptor (unchanged) ----------
    function injectErrorInterceptor(iframe) {
      const interceptorCode = `
        (function() {
          const originalConsoleError = console.error;
          console.error = function(...args) {
            originalConsoleError.apply(console, args);
            window.parent.postMessage({ type: 'console-error', args: args.map(String) }, '*');
          };
          window.addEventListener('error', (event) => {
            window.parent.postMessage({ 
              type: 'runtime-error', 
              message: event.message, 
              filename: event.filename, 
              lineno: event.lineno, 
              colno: event.colno,
              stack: event.error?.stack 
            }, '*');
          });
          window.addEventListener('unhandledrejection', (event) => {
            window.parent.postMessage({ 
              type: 'unhandled-rejection', 
              reason: event.reason?.toString() 
            }, '*');
          });
        })();
      `;
      iframe.addEventListener('load', () => {
        iframe.contentWindow.postMessage({ type: 'inject', code: interceptorCode }, '*');
      });
    }

    window.addEventListener('message', (event) => {
      if (event.data.type?.startsWith('runtime-') || event.data.type === 'console-error') {
        reportError(event.data.type, event.data.message || event.data.args?.join(' '), event.data);
      }
    });

    // ---------- Get dev command (unchanged) ----------
    function getDevCommand(packageJson) {
      const scripts = packageJson.scripts || {};
      let cmd = scripts.dev || scripts.start || scripts.serve;
      if (cmd) {
        const firstWord = cmd.trim().split(/\s+/)[0];
        if (['vite', 'next', 'webpack', 'parcel', 'vue-cli-service', 'react-scripts'].includes(firstWord)) {
          return { direct: true, command: firstWord, args: cmd.slice(firstWord.length).trim().split(/\s+/) };
        }
        return { direct: false, command: 'npm', args: ['run', scripts.dev ? 'dev' : (scripts.start ? 'start' : 'serve')] };
      }
      return { direct: false, command: 'npx', args: ['serve', '--port', '3000'] };
    }

    // ---------- Main boot ----------
    async function boot() {
      try {
        const sessionRes = await fetch(`/api/preview/${sessionId}`);
        if (!sessionRes.ok) throw new Error('Preview session expired');
        const session = await sessionRes.json();

        const webcontainer = await WebContainer.boot();
        loadingMessage.innerText = 'Mounting files...';

        // Mount project files (excluding node_modules for now)
        await mountAndInstall(webcontainer, session);

        // Start dev server
        loadingMessage.innerText = 'Starting dev server...';
        let startCmd, startArgs;
        if (session.files['package.json']) {
          const pkg = JSON.parse(session.files['package.json']);
          const devInfo = getDevCommand(pkg);
          if (devInfo.direct) {
            startCmd = 'npx';
            startArgs = [devInfo.command, ...devInfo.args];
          } else {
            startCmd = devInfo.command;
            startArgs = devInfo.args;
          }
        } else {
          startCmd = 'npx';
          startArgs = ['serve', '--port', '3000'];
        }

        const startProcess = await webcontainer.spawn(startCmd, startArgs);
        startProcess.output.pipeTo(new WritableStream({
          write(data) {
            console.log('server:', data);
            if (data.includes('Error:')) {
              reportError('Runtime Error', data);
            }
          }
        }));

        startupTimeout = setTimeout(() => {
          reportError('Timeout', 'Dev server did not start within 1000 seconds');
        }, 1000000);

        webcontainer.on('server-ready', (port, url) => {
          clearTimeout(startupTimeout);
          loadingDiv.style.display = 'none';
          previewFrame.style.display = 'block';
          previewFrame.src = url;
          injectErrorInterceptor(previewFrame);
        });

      } catch (error) {
        clearTimeout(startupTimeout);
        reportError('Boot Failed', error.message, { stack: error.stack });
      }
    }

    boot();
  </script>
</body>
</html>
