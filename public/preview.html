<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
  <style>
    body { margin: 0; padding: 0; overflow: hidden; background: white; font-family: sans-serif; }
    #preview { width: 100vw; height: 100vh; border: none; }
    #error { display: none; color: #d32f2f; background: #ffebee; padding: 20px; position: absolute; top: 0; left: 0; right: 0; z-index: 1000; white-space: pre-wrap; font-family: monospace; max-height: 200px; overflow: auto; }
    #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    #loading svg { display: block; margin: 0 auto 20px; }
  </style>
</head>
<body>
  <div id="loading">
    <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="dotGrad" cx="30%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#ffd166"/>
          <stop offset="100%" stop-color="#ff9f1c"/>
        </radialGradient>
        <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#a0e7e5"/>
          <stop offset="100%" stop-color="#b4f8c8"/>
        </linearGradient>
        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
          <feMerge>
            <feMergeNode in="offsetblur" />
            <feMergeNode in="SourceGraphic" />
          </feMerge>
        </filter>
      </defs>
      <g fill="#cccccc" opacity="0.3">
        <circle cx="50" cy="20" r="4"/>
        <circle cx="70" cy="30" r="4"/>
        <circle cx="80" cy="50" r="4"/>
        <circle cx="70" cy="70" r="4"/>
        <circle cx="50" cy="80" r="4"/>
        <circle cx="30" cy="70" r="4"/>
        <circle cx="20" cy="50" r="4"/>
        <circle cx="30" cy="30" r="4"/>
      </g>
      <circle cx="50" cy="20" r="6" fill="url(#dotGrad)" filter="url(#softGlow)">
        <animateTransform attributeName="transform" type="rotate" from="0 50 50" to="360 50 50" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="50" cy="50" r="25" fill="none" stroke="url(#ringGrad)" stroke-width="2" stroke-dasharray="4 4"/>
    </svg>
    <span id="loading-message">Booting WebContainer...</span>
  </div>
  <iframe id="preview" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads" style="display: none;"></iframe>
  <div id="error"></div>

  <script type="importmap">
    {
      "imports": {
        "@webcontainer/api": "https://esm.sh/@webcontainer/api@1.2.4"
      }
    }
  </script>

  <script type="module">
    import { WebContainer } from '@webcontainer/api';

    const previewFrame = document.getElementById('preview');
    const loadingDiv = document.getElementById('loading');
    const loadingMessage = document.getElementById('loading-message');
    const errorDiv = document.getElementById('error');
    const sessionId = window.location.pathname.split('/').pop();

    let installTimeout;
    let serverTimeout;

    function log(level, msg, details = {}) {
      const fullMsg = `[${level}] ${msg}`;
      console.log(fullMsg, details);
      // Optionally show in UI for debugging (uncomment if needed)
      // errorDiv.style.display = 'block';
      // errorDiv.innerHTML += `<div>${fullMsg}</div>`;
    }

    function reportError(type, message, details = {}) {
      console.error(type, message, details);
      errorDiv.style.display = 'block';
      errorDiv.innerHTML += `<div><strong>${type}:</strong> ${message}</div>`;
      loadingDiv.style.display = 'none';
      fetch(`/api/preview/${sessionId}/error`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type, message, ...details, timestamp: Date.now() })
      }).catch(() => {});
    }

    function injectErrorInterceptor(iframe) {
      const interceptorCode = `
        (function() {
          const originalConsoleError = console.error;
          console.error = function(...args) {
            originalConsoleError.apply(console, args);
            window.parent.postMessage({ type: 'console-error', args: args.map(String) }, '*');
          };
          window.addEventListener('error', (event) => {
            window.parent.postMessage({ 
              type: 'runtime-error', 
              message: event.message, 
              filename: event.filename, 
              lineno: event.lineno, 
              colno: event.colno,
              stack: event.error?.stack 
            }, '*');
          });
          window.addEventListener('unhandledrejection', (event) => {
            window.parent.postMessage({ 
              type: 'unhandled-rejection', 
              reason: event.reason?.toString() 
            }, '*');
          });
        })();
      `;
      iframe.addEventListener('load', () => {
        iframe.contentWindow.postMessage({ type: 'inject', code: interceptorCode }, '*');
      });
    }

    window.addEventListener('message', (event) => {
      if (event.data.type?.startsWith('runtime-') || event.data.type === 'console-error') {
        reportError(event.data.type, event.data.message || event.data.args?.join(' '), event.data);
      }
    });

    // Helper: parse package.json and return dev command with host flag if needed
    function getDevCommand(packageJson) {
      const scripts = packageJson.scripts || {};
      let command = scripts.dev || scripts.start || scripts.serve;
      if (!command) return null;

      // Detect the tool name (first word)
      const firstWord = command.trim().split(/\s+/)[0];
      const restArgs = command.slice(firstWord.length).trim().split(/\s+/);

      // Add host flag if it's a known dev server
      let args = [...restArgs];
      if (firstWord === 'vite' && !args.includes('--host')) {
        args.push('--host');
      } else if (firstWord === 'next' && !args.includes('-H')) {
        args.unshift('dev', '-H', '0.0.0.0'); // next dev -H 0.0.0.0
      } else if (firstWord === 'react-scripts') {
        // react-scripts start doesn't support --host, but we can use BROWSER=none and maybe detect port from output
        // We'll just run as is
      } else if (firstWord === 'vue-cli-service') {
        args.push('--host', '0.0.0.0');
      }

      // Try to run directly if it's a binary in node_modules/.bin
      const direct = ['vite', 'next', 'react-scripts', 'vue-cli-service', 'webpack', 'parcel'];
      if (direct.includes(firstWord)) {
        return { direct: true, command: 'npx', args: [firstWord, ...args] };
      } else {
        // Fallback to npm run
        const scriptName = scripts.dev ? 'dev' : (scripts.start ? 'start' : 'serve');
        return { direct: false, command: 'npm', args: ['run', scriptName] };
      }
    }

    async function boot() {
      try {
        log('INFO', 'Fetching session data...');
        const sessionRes = await fetch(`/api/preview/${sessionId}`);
        if (!sessionRes.ok) throw new Error('Preview session expired');
        const session = await sessionRes.json();
        log('INFO', 'Session data received', { filesCount: Object.keys(session.files).length });

        const webcontainer = await WebContainer.boot();
        log('INFO', 'WebContainer booted');

        loadingMessage.innerText = 'Mounting files...';
        // Mount files
        const mountStructure = {};
        for (const [filePath, fileContent] of Object.entries(session.files)) {
          const parts = filePath.split('/');
          let current = mountStructure;
          for (let i = 0; i < parts.length; i++) {
            const part = parts[i];
            if (i === parts.length - 1) {
              current[part] = { file: { contents: fileContent } };
            } else {
              current[part] = current[part] || { directory: {} };
              current = current[part].directory;
            }
          }
        }
        await webcontainer.mount(mountStructure);
        log('INFO', 'Files mounted');

        // ----- Install dependencies if package.json exists -----
        if (session.files['package.json']) {
          loadingMessage.innerText = 'Installing dependencies...';
          log('INFO', 'Starting npm install');

          const hasLockfile = session.files['package-lock.json'];
          const installCmd = hasLockfile ? 'ci' : 'install';
          const installArgs = [installCmd, '--prefer-offline', '--no-audit', '--no-fund'];
          const installProcess = await webcontainer.spawn('npm', installArgs);

          let installError = '';
          installProcess.output.pipeTo(new WritableStream({
            write(data) {
              const str = typeof data === 'string' ? data : new TextDecoder().decode(data);
              console.log('npm output:', str);
              if (str.includes('error') || str.includes('ERR!')) {
                installError += str;
                reportError('Install Error', str);
              }
            }
          }));

          installTimeout = setTimeout(() => {
            reportError('Installation Timeout', 'npm install took longer than 1000 seconds');
            installProcess.kill();
          }, 1000000);

          const installExit = await installProcess.exit;
          clearTimeout(installTimeout);

          if (installExit !== 0) {
            reportError('Installation Failed', `npm ${installCmd} failed with code ${installExit}. Last errors:\n${installError.slice(-1000)}`);
            return;
          }
          log('INFO', 'Dependencies installed');
        }

        // ----- Start dev server -----
        loadingMessage.innerText = 'Starting dev server...';
        log('INFO', 'Preparing dev server');

        let startCmd, startArgs;
        if (session.files['package.json']) {
          const pkg = JSON.parse(session.files['package.json']);
          const devInfo = getDevCommand(pkg);
          if (devInfo) {
            startCmd = devInfo.command;
            startArgs = devInfo.args;
          } else {
            // No script – fallback to npx serve
            startCmd = 'npx';
            startArgs = ['serve', '--port', '3000'];
          }
        } else {
          // Static site
          startCmd = 'npx';
          startArgs = ['serve', '--port', '3000'];
        }
        log('INFO', `Spawning server: ${startCmd} ${startArgs.join(' ')}`);

        const serverProcess = await webcontainer.spawn(startCmd, startArgs);
        let serverUrl = null;
        let serverReady = false;

        // Listen for stdout to detect when server is ready
        serverProcess.output.pipeTo(new WritableStream({
          write(data) {
            const str = typeof data === 'string' ? data : new TextDecoder().decode(data);
            console.log('server output:', str);
            if (serverReady) return;
            // Try to extract URL or port
            const urlMatch = str.match(/(https?:\/\/[^\s]+)/i) || str.match(/(http:\/\/localhost:\d+)/i);
            if (urlMatch) {
              serverUrl = urlMatch[1];
              log('INFO', `Detected server ready: ${serverUrl}`);
              serverReady = true;
              clearTimeout(serverTimeout);
              loadingDiv.style.display = 'none';
              previewFrame.style.display = 'block';
              previewFrame.src = serverUrl;
              injectErrorInterceptor(previewFrame);
            } else {
              const portMatch = str.match(/port\s+(\d+)/i);
              if (portMatch) {
                const port = portMatch[1];
                serverUrl = `http://localhost:${port}`;
                log('INFO', `Detected port ${port}, constructing URL: ${serverUrl}`);
                serverReady = true;
                clearTimeout(serverTimeout);
                loadingDiv.style.display = 'none';
                previewFrame.style.display = 'block';
                previewFrame.src = serverUrl;
                injectErrorInterceptor(previewFrame);
              }
            }
          }
        }));

        // Also listen for the native server-ready event as a backup
        webcontainer.on('server-ready', (port, url) => {
          if (serverReady) return;
          log('INFO', `WebContainer server-ready event: ${url}`);
          serverReady = true;
          clearTimeout(serverTimeout);
          loadingDiv.style.display = 'none';
          previewFrame.style.display = 'block';
          previewFrame.src = url;
          injectErrorInterceptor(previewFrame);
        });

        serverTimeout = setTimeout(() => {
          if (!serverReady) {
            reportError('Timeout', 'Dev server did not start within 1000 seconds');
            serverProcess.kill();
          }
        }, 1000000);

      } catch (error) {
        clearTimeout(installTimeout);
        clearTimeout(serverTimeout);
        reportError('Boot Failed', error.message, { stack: error.stack });
      }
    }

    boot();
  </script>
</body>
</html>
